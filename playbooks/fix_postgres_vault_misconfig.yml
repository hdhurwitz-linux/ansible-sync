---
# Removes postgres dumps/folders from the Obsidian vault on any machine,
# stops/disables any old services that point into the vault, and deploys
# the correct pg-backup service pointing to ~/Postegre-Database/.
#
# Safe to run repeatedly. All paths resolved dynamically — no hardcoding.

- name: Fix PostgreSQL vault misconfig and deploy correct backup services
  hosts: all
  become: false
  gather_facts: true

  vars:
    user_home: "{{ ansible_env.HOME }}"
    pg_repo_dir: "{{ user_home }}/postegre-lr-copilot-database"
    pg_backup_script: "{{ pg_repo_dir }}/scripts/pg-backup-and-push.sh"
    pg_session_end: "{{ pg_repo_dir }}/scripts/pg-session-end.sh"
    backup_local_dir: "{{ user_home }}/Postegre-Database"
    systemd_user_dir: "{{ user_home }}/.config/systemd/user"

    # Old service names that may point into the vault
    old_services:
      - pg-backup-shutdown.service
      - pg-backup-startup.timer

  tasks:
    # ── 1. Find the Obsidian vault dynamically ───────────────────────────────
    - name: Find Obsidian vault location
      ansible.builtin.find:
        paths: "{{ user_home }}"
        patterns: ".obsidian"
        file_type: directory
        recurse: true
        depth: 5
      register: obsidian_dirs

    - name: Derive vault root paths
      ansible.builtin.set_fact:
        obsidian_vault_roots: >-
          {{ obsidian_dirs.files | map(attribute='path')
             | map('dirname') | list }}

    - name: Report found vaults
      ansible.builtin.debug:
        msg: "Obsidian vaults found: {{ obsidian_vault_roots }}"

    # ── 2. Remove postgres-backups folder from every vault found ─────────────
    - name: Remove postgres-backups folder from vault
      ansible.builtin.file:
        path: "{{ item }}/postgres-backups"
        state: absent
      loop: "{{ obsidian_vault_roots }}"
      when: obsidian_vault_roots | length > 0

    - name: Remove ASSETS/Databases directory from vault
      ansible.builtin.file:
        path: "{{ item }}/ASSETS/Databases"
        state: absent
      loop: "{{ obsidian_vault_roots }}"
      when: obsidian_vault_roots | length > 0

    - name: Remove postgres-backups references from Obsidian workspace.json
      ansible.builtin.shell: |
        python3 - << 'PY'
        import json
        from pathlib import Path
        p = Path("{{ item }}/.obsidian/workspace.json")
        if not p.exists():
            raise SystemExit(0)
        obj = json.loads(p.read_text())
        def scrub(x):
            if isinstance(x, dict):
                out = {}
                for k, v in x.items():
                    sv = scrub(v)
                    if isinstance(sv, str) and "postgres-backups" in sv:
                        continue
                    out[k] = sv
                return out
            if isinstance(x, list):
                out = []
                for i in x:
                    si = scrub(i)
                    if isinstance(si, str) and "postgres-backups" in si:
                        continue
                    out.append(si)
                return out
            return x
        p.write_text(json.dumps(scrub(obj), indent=2))
        PY
      args:
        executable: /bin/bash
      loop: "{{ obsidian_vault_roots }}"
      when: obsidian_vault_roots | length > 0
      changed_when: true
      failed_when: false

    - name: Exclude postgres-backups in folder-notes plugin config
      ansible.builtin.shell: |
        python3 - << 'PY'
        import json
        from pathlib import Path
        p = Path("{{ item }}/.obsidian/plugins/folder-notes/data.json")
        if not p.exists():
            raise SystemExit(0)
        obj = json.loads(p.read_text())
        ex = obj.get("excludeFolders", [])
        if "postgres-backups" not in ex:
            ex.append("postgres-backups")
            obj["excludeFolders"] = ex
            p.write_text(json.dumps(obj, indent=2))
        PY
      args:
        executable: /bin/bash
      loop: "{{ obsidian_vault_roots }}"
      when: obsidian_vault_roots | length > 0
      changed_when: true
      failed_when: false

    # ── 3. Ensure local postgres working dir exists (correct location) ───────
    - name: Ensure ~/Postegre-Database exists with tight permissions
      ansible.builtin.file:
        path: "{{ backup_local_dir }}"
        state: directory
        mode: "0700"

    # ── 4. Stop and disable old vault-pointing services ──────────────────────
    - name: Stop and disable old pg-backup services pointing to vault
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: stopped
        enabled: false
        scope: user
      loop: "{{ old_services }}"
      failed_when: false # service may not exist on every machine

    - name: Remove old service/timer files that hardcode vault paths
      ansible.builtin.file:
        path: "{{ systemd_user_dir }}/{{ item }}"
        state: absent
      loop: "{{ old_services }}"
      notify: reload systemd user daemon

    # ── 5. Deploy correct pg-backup.service (uses %h, no hardcoded paths) ────
    - name: Ensure systemd user directory exists
      ansible.builtin.file:
        path: "{{ systemd_user_dir }}"
        state: directory
        mode: "0755"

    - name: Deploy pg-backup.service (points to repo script, no vault refs)
      ansible.builtin.copy:
        dest: "{{ systemd_user_dir }}/pg-backup.service"
        mode: "0644"
        content: |
          [Unit]
          Description=PostgreSQL sync from %h/Postegre-Database/ to GitHub
          After=network-online.target

          [Service]
          Type=oneshot
          ExecStart=/bin/bash %h/postegre-lr-copilot-database/scripts/pg-backup-and-push.sh
          StandardOutput=journal
          StandardError=journal

          [Install]
          WantedBy=default.target
      notify: reload systemd user daemon

    - name: Deploy pg-backup.timer (daily, persistent)
      ansible.builtin.copy:
        dest: "{{ systemd_user_dir }}/pg-backup.timer"
        mode: "0644"
        content: |
          [Unit]
          Description=Run PostgreSQL backup daily

          [Timer]
          OnCalendar=daily
          Persistent=true
          RandomizedDelaySec=10min

          [Install]
          WantedBy=timers.target
      notify: reload systemd user daemon

    - name: Enable pg-backup.timer
      ansible.builtin.systemd:
        name: pg-backup.timer
        enabled: true
        scope: user
      failed_when: false

    # ── 6. Fix pg-backup-and-push.sh on this machine if repo is cloned ───────
    - name: Check if postgres repo is cloned locally
      ansible.builtin.stat:
        path: "{{ pg_repo_dir }}"
      register: pg_repo_stat

    - name: Clone postgres repo if not present
      ansible.builtin.git:
        repo: "https://github.com/hdhurwitz-linux/postegre-lr-copilot-database.git"
        dest: "{{ pg_repo_dir }}"
        version: main
      when: not pg_repo_stat.stat.exists
      failed_when: false

    - name: Ensure pg-backup-and-push.sh is executable
      ansible.builtin.file:
        path: "{{ pg_backup_script }}"
        mode: "0755"
      when: pg_repo_stat.stat.exists or not pg_repo_stat.stat.exists

  handlers:
    - name: reload systemd user daemon
      ansible.builtin.systemd:
        daemon_reload: true
        scope: user
