---
- name: Configure Matrix Element keyring integration
  hosts: linux_machines
  gather_facts: true
  vars:
    target_user: "{{ ansible_facts.env.SUDO_USER | default(ansible_facts.env.USER, true) }}"
    target_user_home: "{{ lookup('ansible.builtin.pipe', 'getent passwd ' ~ (ansible_facts.env.SUDO_USER | default(ansible_facts.env.USER, true)) ~ ' | cut -d: -f6') }}"

  tasks:
    - name: Check passwordless sudo availability
      ansible.builtin.command: sudo -n true
      register: sudo_check
      changed_when: false
      failed_when: false

    - name: Set sudo capability fact
      ansible.builtin.set_fact:
        has_passwordless_sudo: "{{ sudo_check.rc == 0 }}"

    - name: Ensure GNOME keyring packages are installed
      become: true
      ansible.builtin.dnf:
        name:
          - gnome-keyring
          - gnome-keyring-pam
        state: present
      when: has_passwordless_sudo | bool

    - name: Note skipped keyring package installation when sudo is unavailable
      ansible.builtin.debug:
        msg: Skipping GNOME keyring package install (no passwordless sudo).
      when: not (has_passwordless_sudo | bool)

    - name: Check if Element Flatpak is installed
      become: true
      become_user: "{{ target_user }}"
      ansible.builtin.command: flatpak info im.riot.Riot
      register: element_flatpak_info
      changed_when: false
      failed_when: false

    - name: Ensure Element Flatpak can talk to Secret Service
      become: true
      become_user: "{{ target_user }}"
      ansible.builtin.command: >-
        flatpak override --user --talk-name=org.freedesktop.secrets im.riot.Riot
      when: element_flatpak_info.rc == 0

    - name: Ensure user keyring socket is enabled and active
      become: true
      become_user: "{{ target_user }}"
      ansible.builtin.command: systemctl --user enable --now gnome-keyring-daemon.socket
      changed_when: false

    - name: Validate keyring access with secret-tool
      become: true
      become_user: "{{ target_user }}"
      ansible.builtin.shell: |
        probe_service='ansible-element-keyring-probe'
        probe_user='{{ target_user }}'
        probe_secret='ok-probe'
        printf '%s' "$probe_secret" | secret-tool store --label='Ansible Keyring Probe' service "$probe_service" username "$probe_user"
        secret-tool lookup service "$probe_service" username "$probe_user"
      args:
        executable: /bin/bash
      register: keyring_probe
      changed_when: false

    - name: Assert keyring probe succeeded
      ansible.builtin.assert:
        that:
          - keyring_probe.stdout is search('ok-probe')
        fail_msg: Keyring probe failed; org.freedesktop.secrets is not functioning for this user session.
        success_msg: Keyring probe succeeded; Element can use the host secret service.