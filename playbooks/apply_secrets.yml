- name: Apply encrypted AI/API secrets to local machine
  hosts: localhost
  gather_facts: true
  vars_files:
    - ../secrets/group_vars/all/vault.yml

  tasks:
    - name: Ensure secrets output directory exists
      ansible.builtin.file:
        path: "{{ ansible_facts.env.HOME }}/.config/ai-secrets"
        state: directory
        mode: "0700"

    - name: Render AI/API environment file from vault values
      ansible.builtin.copy:
        dest: "{{ ansible_facts.env.HOME }}/.config/ai-secrets/env"
        mode: "0600"
        content: |
          {% for item in ai_api_secrets | default({}) | dict2items %}
          {{ item.key }}={{ item.value }}
          {% endfor %}

    - name: Ensure shell profile sources AI secrets env if present
      ansible.builtin.blockinfile:
        path: "{{ ansible_facts.env.HOME }}/.profile"
        create: true
        marker: "# {mark} ANSIBLE MANAGED AI SECRETS"
        block: |
          if [ -f "{{ ansible_facts.env.HOME }}/.config/ai-secrets/env" ]; then
            set -a
            . "{{ ansible_facts.env.HOME }}/.config/ai-secrets/env"
            set +a
          fi
