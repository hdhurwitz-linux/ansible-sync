---
- name: Discover installed packages on all Fedora machines
  hosts: fedora_machines
  gather_facts: false

  tasks:
    - name: Gather package facts
      package_facts:
        manager: auto

    - name: Build host package name list
      set_fact:
        host_package_names: "{{ ansible_facts.packages.keys() | list }}"

- name: Generate union package list for parity
  hosts: localhost
  gather_facts: false
  connection: local

  vars:
    package_exclude_patterns:
      - "^kernel($|-.*)"
      - "^kernel-core($|-.*)"
      - "^kernel-modules($|-.*)"
      - "^kernel-modules-core($|-.*)"
      - "^gpg-pubkey($|-.*)"
      - "^fedora-release($|-.*)"
      - "^fedora-repos($|-.*)"
      - "^fedora-gpg-keys($|-.*)"
      - "^filesystem($|-.*)"

  tasks:
    - name: Build package union from all managed hosts
      set_fact:
        raw_union_packages: >-
          {{
            groups['fedora_machines']
            | map('extract', hostvars, 'host_package_names')
            | select('defined')
            | flatten
            | unique
            | sort
          }}

    - name: Filter package union for portable parity set
      set_fact:
        parity_union_packages: >-
          {{
            raw_union_packages
            | reject('match', package_exclude_patterns | join('|'))
            | list
          }}

    - name: Write generated package union file
      copy:
        dest: "{{ playbook_dir }}/../inventory/group_vars/all/generated_packages.yml"
        mode: "0644"
        content: |
          # Auto-generated by playbooks/union-packages.yml
          parity_union_packages:
          {% for pkg in parity_union_packages %}
            - {{ pkg }}
          {% endfor %}
