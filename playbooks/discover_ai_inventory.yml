- name: Discover and combine AI inventory across tailnet machines
  hosts: localhost
  gather_facts: true
  vars:
    inventory_out_dir: "{{ playbook_dir }}/../state/inventory"
    tailscale_ssh_user: "{{ ansible_facts.env.USER | lower }}"
    ai_bin_candidates:
      - ollama
      - openclaw
      - open-webui
      - honcho
      - groundhogday
      - claude
      - lmstudio
      - python3
      - node
      - npm
      - pnpm
      - uv
      - pipx
      - code
      - docker
      - podman
  tasks:
    - name: Ensure inventory output directory exists
      ansible.builtin.file:
        path: "{{ inventory_out_dir }}"
        state: directory
        mode: "0700"

    - name: Read tailscale network map
      ansible.builtin.command: tailscale status --json
      register: ts_status
      changed_when: false

    - name: Save raw tailscale network map
      ansible.builtin.copy:
        dest: "{{ inventory_out_dir }}/tailscale-status.json"
        content: "{{ ts_status.stdout }}"
        mode: "0600"

    - name: Build Linux peer list from tailscale map
      ansible.builtin.set_fact:
        linux_peers: >-
          {{
            (ts_status.stdout | from_json).Peer
            | default({})
            | dict2items
            | selectattr('value.OS', 'equalto', 'linux')
            | map(attribute='value.DNSName')
            | map('regex_replace', '\\.$', '')
            | list
          }}

    - name: Collect local AI inventory
      ansible.builtin.shell: |
        set -e
        rpm -qa --qf '%{NAME}\n' | grep -Ei 'ollama|openclaw|open-webui|honcho|groundhogday|python3-pip|python3-virtualenv|nodejs|npm|pnpm|uv|pipx|code|docker|podman|postgresql' | sort -u | sed 's/^/RPM:/' || true
        flatpak list --app --columns=application 2>/dev/null | sort -u | sed 's/^/FLATPAK:/' || true
        npm ls -g --depth=0 --parseable 2>/dev/null | tail -n +2 | awk -F/ '{print $NF}' | sort -u | sed 's/^/NPMG:/' || true
        for b in {{ ai_bin_candidates | join(' ') }}; do
          command -v "$b" >/dev/null 2>&1 && echo "BIN:$b";
        done
      args:
        executable: /bin/bash
      register: local_ai_inventory
      changed_when: false

    - name: Save local AI inventory
      ansible.builtin.copy:
        dest: "{{ inventory_out_dir }}/localhost.txt"
        content: "{{ local_ai_inventory.stdout }}\n"
        mode: "0600"

    - name: Collect AI inventory from Linux peers via tailscale ssh
      ansible.builtin.shell: |
        set -e
        tailscale ssh {{ tailscale_ssh_user }}@{{ item }} '
          rpm -qa --qf "%{NAME}\\n" | grep -Ei "ollama|openclaw|open-webui|honcho|groundhogday|python3-pip|python3-virtualenv|nodejs|npm|pnpm|uv|pipx|code|docker|podman|postgresql" | sort -u | sed "s/^/RPM:/" || true
          flatpak list --app --columns=application 2>/dev/null | sort -u | sed "s/^/FLATPAK:/" || true
          npm ls -g --depth=0 --parseable 2>/dev/null | tail -n +2 | awk -F/ "{print \$NF}" | sort -u | sed "s/^/NPMG:/" || true
          for b in {{ ai_bin_candidates | join(' ') }}; do command -v "$b" >/dev/null 2>&1 && echo "BIN:$b"; done
        '
      args:
        executable: /bin/bash
      loop: "{{ linux_peers }}"
      register: peer_ai_inventory
      changed_when: false
      failed_when: false

    - name: Save peer AI inventories
      ansible.builtin.copy:
        dest: "{{ inventory_out_dir }}/{{ item.item | regex_replace('[^A-Za-z0-9_.-]', '_') }}.txt"
        content: "{{ (item.stdout | default('')) ~ '\n' }}"
        mode: "0600"
      loop: "{{ peer_ai_inventory.results }}"

    - name: Build combined AI inventory sets
      ansible.builtin.set_fact:
        combined_rpms: >-
          {{
            (
              [local_ai_inventory.stdout_lines | default([])]
              + (peer_ai_inventory.results | map(attribute='stdout_lines') | map('default', []) | list)
            )
            | flatten
            | select('match', '^RPM:')
            | map('regex_replace', '^RPM:', '')
            | unique
            | sort
            | list
          }}
        combined_flatpaks: >-
          {{
            (
              [local_ai_inventory.stdout_lines | default([])]
              + (peer_ai_inventory.results | map(attribute='stdout_lines') | map('default', []) | list)
            )
            | flatten
            | select('match', '^FLATPAK:')
            | map('regex_replace', '^FLATPAK:', '')
            | unique
            | sort
            | list
          }}
        combined_bins: >-
          {{
            (
              [local_ai_inventory.stdout_lines | default([])]
              + (peer_ai_inventory.results | map(attribute='stdout_lines') | map('default', []) | list)
            )
            | flatten
            | select('match', '^BIN:')
            | map('regex_replace', '^BIN:', '')
            | unique
            | sort
            | list
          }}
        combined_npm_globals: >-
          {{
            (
              [local_ai_inventory.stdout_lines | default([])]
              + (peer_ai_inventory.results | map(attribute='stdout_lines') | map('default', []) | list)
            )
            | flatten
            | select('match', '^NPMG:')
            | map('regex_replace', '^NPMG:', '')
            | unique
            | sort
            | list
          }}

    - name: Save combined AI inventory JSON
      ansible.builtin.copy:
        dest: "{{ inventory_out_dir }}/combined-ai-inventory.json"
        mode: "0600"
        content: |
          {
            "generated_at": "{{ ansible_date_time.iso8601 }}",
            "tailscale_user": "{{ tailscale_ssh_user }}",
            "linux_peers": {{ linux_peers | to_json }},
            "packages_rpm": {{ combined_rpms | to_json }},
            "apps_flatpak": {{ combined_flatpaks | to_json }},
            "binaries": {{ combined_bins | to_json }},
            "npm_globals": {{ combined_npm_globals | to_json }}
          }
