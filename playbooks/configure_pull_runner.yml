- name: Configure systemd ansible-pull runner (GitHub source of truth)
  hosts: linux_machines
  gather_facts: true
  vars:
    target_user: "{{ ansible_facts.env.SUDO_USER | default(ansible_facts.env.USER, true) }}"
    target_uid: "{{ ansible_facts.user_uid }}"
    target_user_home: "{{ lookup('ansible.builtin.pipe', 'getent passwd ' ~ (ansible_facts.env.SUDO_USER | default(ansible_facts.env.USER, true)) ~ ' | cut -d: -f6') }}"
    rendered_pull_env: |
      # GitHub source-of-truth for all machines
      ANSIBLE_SYNC_REPO_URL="{{ ansible_sync_repo_url | default('https://github.com/YOUR_ORG/ansible-sync.git') }}"
      ANSIBLE_SYNC_REPO_BRANCH="{{ ansible_sync_repo_branch | default('main') }}"

      # Local checkout path used by ansible-pull
      ANSIBLE_SYNC_CHECKOUT_DIR="{{ ansible_sync_checkout_dir | default('$HOME/ansible-sync-pull') }}"

      # Inventory and playbook within the pulled repo
      ANSIBLE_SYNC_INVENTORY="{{ ansible_sync_inventory_file | default('inventory') }}"
      ANSIBLE_SYNC_PLAYBOOK="{{ ansible_sync_playbook_file | default('playbooks/full_sync.yml') }}"

      # Optional vault password file path for encrypted secrets
      ANSIBLE_SYNC_VAULT_PASS_FILE="$HOME/.config/ansible-sync/vault-pass.txt"
  tasks:
    - name: Skip non-Linux hosts
      ansible.builtin.meta: end_host
      when: ansible_facts.system != 'Linux'

    - name: Ensure tailscale package is installed
      ansible.builtin.package:
        name: tailscale
        state: present
      become: true

    - name: Ensure tailscaled is enabled and running
      ansible.builtin.systemd:
        name: tailscaled
        enabled: true
        state: started
      become: true

    - name: Ensure pull runner config directory exists
      ansible.builtin.file:
        path: "{{ target_user_home }}/.config/ansible-sync"
        state: directory
        mode: "0700"
        owner: "{{ target_user }}"
        group: "{{ target_user }}"

    - name: Check for canonical vault pass file
      ansible.builtin.stat:
        path: "{{ target_user_home }}/.config/ansible-sync/vault-pass.txt"
      register: canonical_vault_pass

    - name: Check for legacy vault pass file
      ansible.builtin.stat:
        path: "{{ target_user_home }}/.ansible_vault_pass"
      register: legacy_vault_pass

    - name: Migrate legacy vault pass file to canonical location
      ansible.builtin.copy:
        remote_src: true
        src: "{{ target_user_home }}/.ansible_vault_pass"
        dest: "{{ target_user_home }}/.config/ansible-sync/vault-pass.txt"
        mode: "0600"
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
      no_log: true
      when:
        - not canonical_vault_pass.stat.exists
        - legacy_vault_pass.stat.exists

    - name: Ensure legacy vault pass path points to canonical file
      ansible.builtin.file:
        src: "{{ target_user_home }}/.config/ansible-sync/vault-pass.txt"
        dest: "{{ target_user_home }}/.ansible_vault_pass"
        state: link
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        force: true
      when: canonical_vault_pass.stat.exists or legacy_vault_pass.stat.exists

    - name: Ensure user systemd directory exists
      ansible.builtin.file:
        path: "{{ target_user_home }}/.config/systemd/user"
        state: directory
        mode: "0755"
        owner: "{{ target_user }}"
        group: "{{ target_user }}"

    - name: Install pull env example
      ansible.builtin.copy:
        content: "{{ rendered_pull_env }}\n"
        dest: "{{ target_user_home }}/.config/ansible-sync/pull.env.example"
        mode: "0600"
        owner: "{{ target_user }}"
        group: "{{ target_user }}"

    - name: Install pull runner service unit
      ansible.builtin.copy:
        src: "../.config/systemd/user/ansible-sync-pull.service"
        dest: "{{ target_user_home }}/.config/systemd/user/ansible-sync-pull.service"
        mode: "0644"
        owner: "{{ target_user }}"
        group: "{{ target_user }}"

    - name: Install pull runner timer unit
      ansible.builtin.copy:
        src: "../.config/systemd/user/ansible-sync-pull.timer"
        dest: "{{ target_user_home }}/.config/systemd/user/ansible-sync-pull.timer"
        mode: "0644"
        owner: "{{ target_user }}"
        group: "{{ target_user }}"

    - name: Write pull.env from managed values
      ansible.builtin.copy:
        content: "{{ rendered_pull_env }}\n"
        dest: "{{ target_user_home }}/.config/ansible-sync/pull.env"
        mode: "0600"
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        force: true

    - name: Reload user systemd daemon
      become: true
      become_user: "{{ target_user }}"
      environment:
        XDG_RUNTIME_DIR: "/run/user/{{ target_uid }}"
      ansible.builtin.command: systemctl --user daemon-reload
      changed_when: false

    - name: Ensure linger is enabled so user timer starts at boot
      become: true
      ansible.builtin.command: "loginctl enable-linger {{ target_user }}"
      changed_when: false

    - name: Enable and start pull timer
      become: true
      become_user: "{{ target_user }}"
      environment:
        XDG_RUNTIME_DIR: "/run/user/{{ target_uid }}"
      ansible.builtin.command: systemctl --user enable --now ansible-sync-pull.timer
      changed_when: false
