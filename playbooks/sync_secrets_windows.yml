---
- name: Sync Joplin secrets to Windows credential stores
  hosts: windows_machines
  gather_facts: true
  
  vars:
    joplin_db: "{{ ansible_user_dir }}\\.config\\joplin-desktop\\database.sqlite"
    ai_secrets_dir: "{{ ansible_user_dir }}\\.config\\ai-secrets"
  
  tasks:
    - name: Check if Joplin database exists
      win_stat:
        path: "{{ joplin_db }}"
      register: joplin_db_stat
    
    - name: Skip if no Joplin database
      debug:
        msg: "Joplin database not found on {{ inventory_hostname }}, skipping"
      when: not joplin_db_stat.stat.exists
    
    - name: Install PowerShell SecretStore if needed
      block:
        - name: Check PowerShell version
          win_powershell:
            script: |
              $PSVersionTable.PSVersion.Major
          register: ps_version
        
        - name: Install SecretStore module
          win_powershell:
            script: |
              if ((Get-Module -ListAvailable | Where-Object Name -eq "Microsoft.PowerShell.SecretStore") -eq $null) {
                Install-Module -Name Microsoft.PowerShell.SecretStore -Force -AllowClobber
              }
              $env:VAULT_HOME = "$env:APPDATA\PowerShell\SecretStore"
              $storePath = "$env:VAULT_HOME\secretstore.metadata.json"
              if (-not (Test-Path $storePath)) {
                [pscredential]$cred = New-Object System.Management.Automation.PSCredential ('user', (ConvertTo-SecureString 'LocalVault' -AsPlainText -Force))
                Register-SecretVault -Name LocalKeyVault -ModuleName Microsoft.PowerShell.SecretStore -DefaultVault -SkipValidate
              }
          when: joplin_db_stat.stat.exists
      when: joplin_db_stat.stat.exists
    
    - name: Create ai-secrets directory
      win_file:
        path: "{{ ai_secrets_dir }}"
        state: directory
      when: joplin_db_stat.stat.exists
    
    - name: Copy extraction script to Windows machine
      win_copy:
        src: "{{ playbook_dir }}/../scripts/extract_joplin_secrets.py"
        dest: "{{ ai_secrets_dir }}\\extract_joplin_secrets.py"
      when: joplin_db_stat.stat.exists
    
    - name: Extract secrets from Joplin (Windows)
      win_powershell:
        script: |
          $result = & python "{{ ai_secrets_dir }}\extract_joplin_secrets.py" json
          $result | ConvertFrom-Json
      register: extracted_secrets
      when: joplin_db_stat.stat.exists
    
    - name: Sync secrets to Windows Credential Manager
      win_powershell:
        script: |
          $secrets = @{
          {% for key, value in extracted_secrets.output.items() %}
            "{{ key }}" = "{{ value | replace('\\', '\\\\') | replace('"', '\\"') }}";
          {% endfor %}
          }
          
          foreach ($key in $secrets.Keys) {
            $cred = New-Object System.Management.Automation.PSCredential ($key, (ConvertTo-SecureString $secrets[$key] -AsPlainText -Force))
            $null = cmdkey /add:"$key" /user:"$key" /pass:"$($secrets[$key])"
            Write-Host "✓ Stored $key in Windows Credential Manager"
          }
      when: joplin_db_stat.stat.exists
      register: cred_manager_result
    
    - name: Sync secrets to PowerShell SecretVault
      win_powershell:
        script: |
          $secrets = @{
          {% for key, value in extracted_secrets.output.items() %}
            "{{ key }}" = "{{ value | replace('\\', '\\\\') | replace('"', '\\"') }}";
          {% endfor %}
          }
          
          foreach ($key in $secrets.Keys) {
            $sec = ConvertTo-SecureString $secrets[$key] -AsPlainText -Force
            Set-Secret -Vault LocalKeyVault -Name $key -Secret $sec -Force
            Write-Host "✓ Stored $key in PowerShell SecretVault"
          }
      when: joplin_db_stat.stat.exists
      register: secretvault_result
    
    - name: Create env file for Windows
      win_copy:
        content: |
          # Auto-generated from Joplin vault — do NOT edit manually
          # Source this in PowerShell Profile: Get-Content $PROFILE | Select-String "ai-secrets" -Quiet || Add-Content $PROFILE "Get-Content ~/.config/ai-secrets/env.ps1 | ForEach-Object {if ($_ -match '^[A-Z_].*=') {$k, $v = $_ -split '=', 2; Set-Item env:$k $v}}"
          
          {% for key, value in extracted_secrets.output.items() %}
          $env:{{ key }} = "{{ value | replace('\\', '\\\\') | replace('"', '\\"') }}"
          {% endfor %}
        dest: "{{ ai_secrets_dir }}\\env.ps1"
      when: joplin_db_stat.stat.exists
