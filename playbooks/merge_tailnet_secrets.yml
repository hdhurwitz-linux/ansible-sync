- name: Merge AI/API secrets from tailnet machines and apply locally
  hosts: localhost
  gather_facts: true
  vars_files:
    - ../secrets/group_vars/all/vault.yml
  vars:
    tailscale_ssh_user: "{{ ansible_facts.env.USER | lower }}"
    secrets_file_relpath: ".config/ai-secrets/env"
    merge_out_dir: "{{ playbook_dir }}/../state/inventory"

  tasks:
    - name: Ensure merge output directory exists
      ansible.builtin.file:
        path: "{{ merge_out_dir }}"
        state: directory
        mode: "0700"

    - name: Read tailscale status json
      ansible.builtin.command: tailscale status --json
      register: ts_status
      changed_when: false

    - name: Build online Linux peer list
      ansible.builtin.set_fact:
        online_linux_peers: >-
          {{
            (ts_status.stdout | from_json).Peer
            | default({})
            | dict2items
            | selectattr('value.OS', 'equalto', 'linux')
            | selectattr('value.Online', 'equalto', true)
            | map(attribute='value.DNSName')
            | map('regex_replace', '\\.$', '')
            | reject('equalto', (ts_status.stdout | from_json).Self.DNSName | regex_replace('\\.$', ''))
            | list
          }}

    - name: Read secrets env file from peers
      ansible.builtin.shell: |
        set -e
        tailscale ssh {{ tailscale_ssh_user }}@{{ item }} 'if [ -f "$HOME/{{ secrets_file_relpath }}" ]; then cat "$HOME/{{ secrets_file_relpath }}"; fi'
      args:
        executable: /bin/bash
      loop: "{{ online_linux_peers }}"
      register: peer_secret_reads
      changed_when: false
      failed_when: false

    - name: Build merged secrets dict from vault baseline
      ansible.builtin.set_fact:
        merged_secrets: "{{ ai_api_secrets | default({}) }}"

    - name: Merge peer secret key-values over baseline
      ansible.builtin.set_fact:
        merged_secrets: "{{ merged_secrets | combine(peer_dict, recursive=true) }}"
      vars:
        kv_lines: >-
          {{
            (item.stdout_lines | default([]))
            | select('match', '^[A-Za-z_][A-Za-z0-9_]*=.*$')
            | list
          }}
        peer_dict: >-
          {{
            dict(
              kv_lines | map('regex_replace', '^([^=]+)=(.*)$', '\\1|\\2')
                       | map('split', '|', 1)
            )
          }}
      loop: "{{ peer_secret_reads.results }}"
      when: (item.rc | default(1)) == 0 and (item.stdout | default('') | length) > 0

    - name: Save merged secret metadata (keys only)
      ansible.builtin.copy:
        dest: "{{ merge_out_dir }}/merged-secrets-keys.json"
        mode: "0600"
        content: |
          {
            "generated_at": "{{ ansible_date_time.iso8601 }}",
            "peer_count": {{ online_linux_peers | length }},
            "keys": {{ merged_secrets.keys() | list | sort | to_json }}
          }

    - name: Ensure local secrets directory exists
      ansible.builtin.file:
        path: "{{ ansible_facts.env.HOME }}/.config/ai-secrets"
        state: directory
        mode: "0700"

    - name: Apply merged secrets locally
      ansible.builtin.copy:
        dest: "{{ ansible_facts.env.HOME }}/.config/ai-secrets/env"
        mode: "0600"
        content: |
          {% for item in merged_secrets | dict2items %}
          {{ item.key }}={{ item.value }}
          {% endfor %}
