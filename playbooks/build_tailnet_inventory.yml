- name: Build generated Ansible inventory from connected Tailscale peers
  hosts: localhost
  gather_facts: true
  vars:
    generated_inventory_path: "{{ tailnet_inventory_file | default(playbook_dir ~ '/../inventory/10-tailnet.generated.yml') }}"
    tailscale_ssh_user: "{{ ansible_facts.env.USER | lower }}"

  tasks:
    - name: Read tailscale network map
      ansible.builtin.command: tailscale status --json
      register: tailscale_status
      changed_when: false
      failed_when: false

    - name: Build linux peer records from tailscale status
      ansible.builtin.set_fact:
        linux_peer_records: >-
          {{
            (tailscale_status.stdout | default('{}') | from_json).Peer
            | default({})
            | dict2items
            | selectattr('value.OS', 'equalto', 'linux')
            | map(attribute='value')
            | list
          }}
      when: tailscale_status.rc == 0

    - name: Ensure generated inventory parent directory exists
      ansible.builtin.file:
        path: "{{ generated_inventory_path | dirname }}"
        state: directory
        mode: "0755"

    - name: Write generated tailscale inventory
      ansible.builtin.copy:
        dest: "{{ generated_inventory_path }}"
        mode: "0644"
        content: |
          # Auto-generated by playbooks/build_tailnet_inventory.yml
          # Do not edit manually.
          all:
            children:
              tailscale_linux:
                hosts:
          {% for host in linux_peer_records | default([]) %}
                  {{ host.DNSName | default(host.HostName) | regex_replace('\\.$', '') | regex_replace('[^A-Za-z0-9_.-]', '_') }}:
                    ansible_host: {{ host.DNSName | default(host.HostName) | regex_replace('\\.$', '') }}
                    ansible_user: {{ tailscale_ssh_user }}
                    ansible_connection: ssh
          {% endfor %}
              local:
                hosts:
                  localhost:
                    ansible_connection: local

    - name: Report generated inventory path
      ansible.builtin.debug:
        msg: "Generated tailscale inventory at {{ generated_inventory_path }}"
