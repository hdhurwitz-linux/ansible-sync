---
- name: Sync Joplin secrets to GNOME Keyring
  hosts: linux_machines
  gather_facts: true
  become: false

  vars:
    sync_script: "{{ playbook_dir }}/../scripts/sync_secrets_local.sh"
    joplin_db: "{{ ansible_user_dir }}/.config/joplin-desktop/database.sqlite"

  tasks:
    - name: Check if Joplin database exists
      stat:
        path: "{{ joplin_db }}"
      register: joplin_db_stat

    - name: Skip if no Joplin database
      debug:
        msg: "Joplin database not found on {{ inventory_hostname }}, skipping"
      when: not joplin_db_stat.stat.exists

    - name: Check if running GNOME desktop
      shell: echo "${XDG_CURRENT_DESKTOP}"
      register: xdg_desktop
      changed_when: false
      when: joplin_db_stat.stat.exists

    - name: Install secret-tool if needed (GNOME Keyring CLI)
      block:
        - name: Install gnome-keyring package
          package:
            name: gnome-keyring
            state: present
          become: true
      when:
        - joplin_db_stat.stat.exists
        - "('GNOME' in xdg_desktop.stdout) or (ansible_facts['os_family'] == 'RedHat')"

    - name: Copy secret extraction script
      copy:
        src: "{{ playbook_dir }}/../scripts/extract_joplin_secrets.py"
        dest: "{{ ansible_user_dir }}/.local/bin/extract_joplin_secrets"
        mode: "0755"
      when: joplin_db_stat.stat.exists

    - name: Copy local sync script
      copy:
        src: "{{ playbook_dir }}/../scripts/sync_secrets_local.sh"
        dest: "{{ ansible_user_dir }}/.local/bin/sync_secrets_local"
        mode: "0755"
      when: joplin_db_stat.stat.exists

    - name: Create ~/.config/ai-secrets directory
      file:
        path: "{{ ansible_user_dir }}/.config/ai-secrets"
        state: directory
        mode: "0700"
      when: joplin_db_stat.stat.exists

    - name: Run local secret sync
      shell: "{{ ansible_user_dir }}/.local/bin/sync_secrets_local"
      environment:
        XDG_CURRENT_DESKTOP: "{{ xdg_desktop.stdout }}"
      register: sync_result
      when: joplin_db_stat.stat.exists
      changed_when: "'updated' in sync_result.stdout.lower()"

    - name: Show sync result
      debug:
        msg: "{{ sync_result.stdout_lines }}"
      when:
        - joplin_db_stat.stat.exists
        - sync_result.stdout is defined
