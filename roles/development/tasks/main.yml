---
- name: Install Python development tools
  dnf:
    name:
      - python3
      - python3-devel
      - python3-pip
      - python3-wheel
      - pipx
      - poetry
    state: present
  become: true
  tags:
    - development
    - python

- name: Ensure pipx path is configured
  command: pipx ensurepath
  changed_when: false
  tags:
    - development
    - python

- name: Install Python CLI dev tools with pipx
  command: "pipx install {{ item }}"
  loop:
    - black
    - pylint
    - mypy
    - flake8
  register: pipx_install
  failed_when: pipx_install.rc != 0 and ('already seems to be installed' not in pipx_install.stderr)
  changed_when: "'installed package' in (pipx_install.stdout | lower)"
  tags:
    - development
    - python

- name: Install Node.js and npm
  dnf:
    name:
      - nodejs
      - npm
    state: present
  become: true
  tags:
    - development
    - nodejs

- name: Install container tools
  dnf:
    name:
      - podman
      - podman-compose
      - skopeo
    state: present
  become: true
  tags:
    - development
    - containers

- name: Install development utilities
  dnf:
    name:
      - gcc
      - gcc-c++
      - gdb
      - lldb
      - cmake
      - make
      - autoconf
      - automake
      - libtool
      - pkg-config
    state: present
  become: true
  tags:
    - development
    - build-tools

- name: Install text editors and IDEs helpers
  dnf:
    name:
      - neovim
      - emacs
    state: present
  become: true
  tags:
    - development
    - editors
